name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions: {}

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-asyncio homeassistant

      - name: Run release validation tests
        run: |
          python -m pytest \
            tests/test_hacs_release_readiness.py \
            tests/test_release_readiness.py \
            tests/test_compatibility_migration_matrix.py \
            tests/test_performance_resource_hardening.py \
            tests/test_fault_injection_and_recovery.py \
            -q
