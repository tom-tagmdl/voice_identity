get_diagnostics:
  name: Get diagnostics
  description: >-
    Return a safe, allowlisted diagnostics projection for Voice Identity.
  fields:
    entry_id:
      required: false
      example: 01JABCDEF1234567890XYZ
      selector:
        text:

get_repairs:
  name: Get repairs
  description: >-
    Return deterministic, read-only repair recommendations derived from Voice Identity diagnostics.
  fields:
    entry_id:
      required: false
      example: 01JABCDEF1234567890XYZ
      selector:
        text:

get_health:
  name: Get health
  description: >-
    Return deterministic runtime health aggregation for Voice Identity components.
  fields:
    entry_id:
      required: false
      example: 01JABCDEF1234567890XYZ
      selector:
        text:

get_telemetry:
  name: Get telemetry
  description: >-
    Return privacy-safe operational telemetry projection for Voice Identity runtime.
  fields:
    entry_id:
      required: false
      example: 01JABCDEF1234567890XYZ
      selector:
        text:

attribute_speaker:
  name: Attribute speaker
  description: >-
    Return advisory, privacy-safe speaker attribution evidence for one runtime request.
  fields:
    entry_id:
      required: false
      example: 01JABCDEF1234567890XYZ
      selector:
        text:
    audio_ref:
      required: false
      example: session_audio_ref_001
      selector:
        text:
    candidate_scope:
      required: false
      example:
        - person_001
        - person_002
      selector:
        object:
    model_preference:
      required: false
      example: ecapa_v1
      selector:
        text:
    conversation_id:
      required: false
      example: conv_20260723_001
      selector:
        text:
    device_id:
      required: false
      example: assist_satellite_kitchen
      selector:
        text:
    satellite_id:
      required: false
      example: sat_kitchen_01
      selector:
        text:
    room_id:
      required: false
      example: kitchen
      selector:
        text:
    turn_index:
      required: false
      example: 3
      selector:
        number:
          min: 0
          mode: box
    pipeline_id:
      required: false
      example: assist_pipeline_primary
      selector:
        text:

